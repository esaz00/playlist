<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYLIST</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3rem);
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1;
  }

  header span { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

  .layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    flex: 1;
  }

  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-left: none; border-top: 1px solid var(--border); max-height: 38vh; }
  }

  /* PLAYER */
  .player-area { display: flex; flex-direction: column; padding: 20px; gap: 14px; }

  .video-wrap {
    position: relative;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    aspect-ratio: 16/9;
  }

  video { width: 100%; height: 100%; display: block; object-fit: contain; }

  .drop-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    background: #000; cursor: pointer; transition: background .2s;
  }
  .drop-overlay.hidden { display: none; }
  .drop-overlay.drag { background: #111; }

  .drop-icon {
    width: 52px; height: 52px;
    border: 2px solid var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 1.4rem;
  }

  .drop-overlay p { font-size: 0.85rem; color: var(--muted); text-align: center; line-height: 1.5; }
  .drop-overlay strong { color: var(--text); }

  /* Progress */
  .progress-wrap { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; color: var(--muted); }

  input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
  }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .now-playing { flex: 1; min-width: 0; }
  .now-playing .lbl { font-size: 0.62rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .now-playing .ttl { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .btn {
    background: none; border: 1px solid var(--border); color: var(--text);
    padding: 7px 14px; border-radius: 2px; font-family: inherit; font-size: 0.78rem;
    cursor: pointer; transition: border-color .15s, color .15s, background .15s;
    white-space: nowrap; user-select: none;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.accent { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .btn.accent:hover { background: #d4e83f; }
  .btn.on { border-color: var(--accent); color: var(--accent); }
  .btn-sq { width: 34px; height: 34px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: .95rem; }

  /* SIDEBAR */
  .sidebar { border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

  .sidebar-head {
    padding: 14px 18px 10px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .sidebar-head h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .12em; color: var(--muted); }

  .badge { background: var(--border); color: var(--muted); font-size: .68rem; padding: 2px 8px; border-radius: 20px; }

  .playlist { flex: 1; overflow-y: auto; padding: 6px 0; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .playlist::-webkit-scrollbar { width: 3px; }
  .playlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty { padding: 36px 18px; text-align: center; color: var(--muted); font-size: .8rem; line-height: 1.7; }

  .pitem {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 18px; cursor: pointer; transition: background .12s;
    border-left: 2px solid transparent;
  }
  .pitem:hover { background: var(--surface); }
  .pitem.active { border-left-color: var(--accent); background: rgba(232,255,71,.05); }

  .pnum { font-family: 'Bebas Neue', sans-serif; font-size: .82rem; color: var(--muted); width: 18px; text-align: center; flex-shrink: 0; }
  .pitem.active .pnum { color: var(--accent); }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  .pinfo { flex: 1; min-width: 0; }
  .pname { font-size: .8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pdur  { font-size: .68rem; color: var(--muted); margin-top: 1px; }

  .pdel {
    opacity: 0; background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: .88rem; padding: 3px; transition: color .12s, opacity .12s;
  }
  .pitem:hover .pdel { opacity: 1; }
  .pdel:hover { color: #ff5555; }

  .sidebar-foot { padding: 10px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-foot .btn { width: 100%; text-align: center; }

  #fileInput { display: none; }
</style>
</head>
<body>

<header>
  <h1>PLAYLIST</h1>
  <span>Lecteur vidéo continu</span>
</header>

<div class="layout">

  <div class="player-area">
    <div class="video-wrap" id="wrap">
      <div class="drop-overlay" id="overlay">
        <div class="drop-icon">▶</div>
        <p><strong>Glisse tes vidéos ici</strong><br>ou clique pour choisir</p>
      </div>
      <video id="vid" playsinline webkit-playsinline autoplay muted></video>
    </div>

    <div class="progress-wrap">
      <span id="tCur">0:00</span>
      <input type="range" id="seek" min="0" max="100" value="0" step="0.1">
      <span id="tDur">0:00</span>
    </div>

    <div class="controls">
      <div class="now-playing">
        <div class="lbl">En cours</div>
        <div class="ttl" id="nowTitle">—</div>
      </div>
      <button class="btn btn-sq" id="btnPrev">⏮</button>
      <button class="btn btn-sq accent" id="btnPlay">▶</button>
      <button class="btn btn-sq" id="btnNext">⏭</button>
      <button class="btn" id="btnLoop">↻ Boucle</button>
      <button class="btn btn-sq" id="btnMute">🔊</button>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-head">
      <h2>Playlist</h2>
      <span class="badge" id="badge">0 vidéo</span>
    </div>
    <div class="playlist" id="list">
      <div class="empty">Aucune vidéo.<br>Ajoute-en via le bouton ci-dessous.</div>
    </div>
    <div class="sidebar-foot">
      <button class="btn" id="btnAdd">+ Ajouter des vidéos</button>
      <input type="file" id="fileInput" accept="video/*" multiple>
    </div>
  </aside>

</div>

<script>
  const vid      = document.getElementById('vid');
  const overlay  = document.getElementById('overlay');
  const wrap     = document.getElementById('wrap');
  const btnPlay  = document.getElementById('btnPlay');
  const btnPrev  = document.getElementById('btnPrev');
  const btnNext  = document.getElementById('btnNext');
  const btnLoop  = document.getElementById('btnLoop');
  const btnMute  = document.getElementById('btnMute');
  const seek     = document.getElementById('seek');
  const tCur     = document.getElementById('tCur');
  const tDur     = document.getElementById('tDur');
  const nowTitle = document.getElementById('nowTitle');
  const list     = document.getElementById('list');
  const badge    = document.getElementById('badge');
  const btnAdd   = document.getElementById('btnAdd');
  const fileInput= document.getElementById('fileInput');

  let files   = [];
  let cur     = -1;
  let looping = false;
  let userUnmuted = false;

  // Dès le premier clic → on coupe le mute
  document.addEventListener('click', () => {
    if (!userUnmuted) { userUnmuted = true; vid.muted = false; }
  }, { capture: true });

  /* ─── Lecture ─── */
  function doPlay() {
    vid.play().catch(() => {});
  }

  function loadVideo(idx, autoplay) {
    if (idx < 0 || idx >= files.length) return;
    cur = idx;
    nowTitle.textContent = files[idx].name;
    vid.src = files[idx].url;
    if (autoplay) {
      vid.oncanplay = () => { vid.oncanplay = null; doPlay(); };
    }
    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({ title: files[idx].name, artist: 'Playlist' });
    }
    renderList();
  }

  vid.addEventListener('ended', () => {
    if (cur < files.length - 1) loadVideo(cur + 1, true);
    else if (looping) loadVideo(0, true);
  });

  vid.addEventListener('play',  () => btnPlay.textContent = '⏸');
  vid.addEventListener('pause', () => btnPlay.textContent = '▶');

  vid.addEventListener('timeupdate', () => {
    if (!vid.duration) return;
    seek.value = (vid.currentTime / vid.duration) * 100;
    tCur.textContent = fmt(vid.currentTime);
  });

  vid.addEventListener('loadedmetadata', () => {
    tDur.textContent = fmt(vid.duration);
    if (files[cur]) { files[cur].duration = fmt(vid.duration); renderList(); }
  });

  seek.addEventListener('input', () => {
    if (vid.duration) vid.currentTime = (seek.value / 100) * vid.duration;
  });

  /* ─── Boutons ─── */
  btnPlay.addEventListener('click', () => {
    if (cur === -1) return;
    vid.paused ? doPlay() : vid.pause();
  });

  btnPrev.addEventListener('click', () => {
    if (cur > 0) loadVideo(cur - 1, true);
    else if (looping && files.length) loadVideo(files.length - 1, true);
  });

  btnNext.addEventListener('click', () => {
    if (cur < files.length - 1) loadVideo(cur + 1, true);
    else if (looping && files.length) loadVideo(0, true);
  });

  btnLoop.addEventListener('click', () => {
    looping = !looping;
    btnLoop.classList.toggle('on', looping);
  });

  btnMute.addEventListener('click', () => {
    userUnmuted = true;
    vid.muted = !vid.muted;
    btnMute.textContent = vid.muted ? '🔇' : '🔊';
    btnMute.classList.toggle('on', vid.muted);
  });

  /* ─── Media Session ─── */
  if ('mediaSession' in navigator) {
    navigator.mediaSession.setActionHandler('play',          () => doPlay());
    navigator.mediaSession.setActionHandler('pause',         () => vid.pause());
    navigator.mediaSession.setActionHandler('previoustrack', () => btnPrev.click());
    navigator.mediaSession.setActionHandler('nexttrack',     () => btnNext.click());
  }

  /* ─── Fichiers ─── */
  function addFiles(newFiles) {
    let added = 0;
    Array.from(newFiles).forEach(f => {
      if (!f.type.startsWith('video/')) return;
      files.push({ url: URL.createObjectURL(f), name: f.name.replace(/\.[^.]+$/, ''), duration: '—' });
      added++;
    });
    if (!added) return;
    renderList();
    overlay.classList.add('hidden');
    if (cur === -1) loadVideo(0, false);
  }

  btnAdd.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { addFiles(e.target.files); fileInput.value = ''; });
  overlay.addEventListener('click', () => fileInput.click());

  wrap.addEventListener('dragover',  e => { e.preventDefault(); overlay.classList.add('drag'); });
  wrap.addEventListener('dragleave', () => overlay.classList.remove('drag'));
  wrap.addEventListener('drop', e => { e.preventDefault(); overlay.classList.remove('drag'); addFiles(e.dataTransfer.files); });

  /* ─── Suppression ─── */
  function removeVideo(idx) {
    URL.revokeObjectURL(files[idx].url);
    files.splice(idx, 1);
    if (files.length === 0) {
      cur = -1; vid.src = ''; nowTitle.textContent = '—';
      overlay.classList.remove('hidden'); renderList(); return;
    }
    if (cur === idx) {
      if (cur >= files.length) cur = files.length - 1;
      loadVideo(cur, true);
    } else if (cur > idx) cur--;
    renderList();
  }

  /* ─── Rendu liste ─── */
  function renderList() {
    const n = files.length;
    badge.textContent = n + (n === 1 ? ' vidéo' : ' vidéos');
    if (n === 0) { list.innerHTML = '<div class="empty">Aucune vidéo.<br>Ajoute-en via le bouton ci-dessous.</div>'; return; }

    list.innerHTML = files.map((f, i) => `
      <div class="pitem ${i === cur ? 'active' : ''}" data-i="${i}">
        <span class="pnum">${i + 1}</span>
        ${i === cur ? '<span class="dot"></span>' : ''}
        <div class="pinfo">
          <div class="pname">${esc(f.name)}</div>
          <div class="pdur">${f.duration}</div>
        </div>
        <button class="pdel" data-d="${i}">✕</button>
      </div>`).join('');

    list.querySelectorAll('.pitem').forEach(el =>
      el.addEventListener('click', e => {
        if (e.target.closest('[data-d]')) return;
        loadVideo(+el.dataset.i, true);
      })
    );
    list.querySelectorAll('[data-d]').forEach(btn =>
      btn.addEventListener('click', e => { e.stopPropagation(); removeVideo(+btn.dataset.d); })
    );

    const active = list.querySelector('.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  /* ─── Utils ─── */
  function fmt(s) {
    if (!isFinite(s)) return '—';
    return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
